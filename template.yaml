AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: virtualVideoGameEvents

Globals:
  Function:
    Timeout: 3

Resources:

  ApiGatewayDefaultRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ApiGatewayDefaultRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Policies:
        - PolicyName: ExecuteLambdaPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: 'lambda:InvokeFunction'
                Resource: 
                  Fn::Sub: "arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:*"
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Dev
      EndpointConfiguration:
        Type: REGIONAL
      DefinitionBody: 
        'Fn::Transform':
          Name: 'AWS::Include'
          Parameters:
            Location: './virtual-video-game-events.yaml'

  ReadUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ReadUserFunction
      CodeUri: src/handlers/user
      Handler: readUser.readUserLambdaHandler
      Runtime: nodejs20.x
      Architectures:
        - x86_64
      Events:
        ReadUser:
          Type: Api
          Properties:
            Path: /readUser
            Method: post
            RestApiId:
              Ref: ApiGateway

Outputs:
  HelloWorldApi:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${ApiGateway.Stage}"
